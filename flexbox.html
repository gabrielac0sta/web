<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
       #box-div-4{position: relative; left: 50px; top: -30px;} /*Muda só o div 4*/

       .container{display: flex; 
        height: 100vh; 
        flex-direction: row; 
        justify-content: space-around; 
        align-items: center;} /*organiza os elementos do container*/

        .box{background-color: cadetblue;
        border: 1px solid blue;
        flex-grow: 1;}

        .box:hover{flex-grow: 5;
        transition: all 3s;} /*ao passar o mouse sobre o grow aumenta*/
        #box-divi-1{order: -6;}
        #box-div-3{order: -4;}
        #box-div-5{order: -5;}
    </style>
</head>
<body>
    /* .container>div.item$*3
     <div class="container">
        <div class="item1"></div>
        <div class="item2"></div>
        <div class="item3"></div>
     </div> */

    <div class="container">
        <div class="box" id="box-div-1">1</div>
        <div class="box" id="box-div-2">2</div>
        <div class="box" id="box-div-3">3</div>
        <div class="box" id="box-div-4">4</div>
        <div class="box" id="box-div-5">5</div>
    </div>
    
    <div class="container">
        <span class="box" id="box-span-1">1</span>
        <span class="box" id="box-span-2">2</span>
        <span class="box" id="box-span-3">3</span>
        <span class="box" id="box-span-4">4</span>
        <span class="box" id="box-span-5">5</span>
    </div>
</body>
</html>
