<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        .container{
            display: grid;

            grid-template-rows: 100px 200px 30vh;
            grid-template-areas: "cabecario cabecario cabecario" 
            "menusito principal principal" 
            "rodape rodape rodape";
        }
        .box{
           border: 1px solid black;
        }
        
        #box1{grid-area: cabecario;}
        #box2{grid-area: menusito;}
        #box3{grid-area: principal;}
        #box10{grid-area: rodape;}
        
    </style>
</head>
<body>
    <div class="container">
        <div class="box" id="box1">1 - header </div>
        <div class="box" id="box2">2 - menu</div>
        <div class="box" id="box3">3 - principal</div>
        <div class="box" id="box4">4</div>
        <div class="box" id="box5">5</div>
        <div class="box" id="box6">6</div>
        <div class="box" id="box7">7</div>
        <div class="box" id="box8">8</div>
        <div class="box" id="box9">9</div>
        <div class="box" id="box10">10</div>
    </div>
</body>
</html>
