<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <title>Formulário de Contato</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <p><strong>Preencha o formulário abaixo para entrar em contato. Todos os campos obrigatórios devem ser preenchidos corretamente.</strong></p>

        <p><a href="4_curriculo.html">Voltar para o currículo</a></p>

        <form>
            <label for="nome">Nome:</label><br>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo" required><br><br>

            <label for="email">E-mail:</label><br>
            <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required><br><br>

            <label for="assunto">Assunto:</label><br>
            <input type="text" id="assunto" name="assunto" placeholder="Digite o assunto"><br><br>

            <label for="estado">Estado:</label><br>
            <select id="estado" name="estado">
                <option value="">Selecione...</option>
                <option value="SP">São Paulo</option>
                <option value="RJ">Rio de Janeiro</option>
                <option value="MG">Minas Gerais</option>
                <option value="SC">Santa Catarina</option>
                <option value="RS">Rio Grande do Sul</option>
                <option value="PR">Paraná</option>
            </select><br><br>

            <label for="mensagem">Mensagem:</label><br>
            <textarea id="mensagem" name="mensagem" rows="5" cols="40" placeholder="Digite sua mensagem"></textarea><br><br>

            <input type="submit" value="Enviar">
            
        </form>

    </body>
</html>
